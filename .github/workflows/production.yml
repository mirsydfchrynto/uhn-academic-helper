name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Next.js
      # Expose minimal mock variables for the build to succeed if needed
      env:
        NEXT_TELEMETRY_DISABLED: 1
      run: npm run build

    - name: Lint Code
      run: npm run lint --if-present

  docker-publish:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/uhn-academic-helper:latest
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/uhn-academic-helper:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/uhn-academic-helper:buildcache,mode=max
