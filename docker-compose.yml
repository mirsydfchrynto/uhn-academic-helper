version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: uhn-academic-helper-web:latest
    container_name: uhn-academic-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # 12-Factor App Rule: All configurations come from environment variables.
      # You MUST pass these at runtime using a .env file or VPS environment variables.
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # BullMQ Redis Broker for Background Worker Queues (Preparation for Agentic Queue)
  redis:
    image: redis:7-alpine
    container_name: uhn-academic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
